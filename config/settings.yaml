# General settings
general:
  seed: 42

# MediaPipe configuration
mediapipe:
  min_detection_confidence: 0.3
  max_num_hands: 1
  model_path: "../models/hand_landmarker.task"

# Random Forest hyperparameters
random_forest:
  n_estimators: 200
  max_depth: 20
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: "sqrt"
  class_weight: "balanced"
